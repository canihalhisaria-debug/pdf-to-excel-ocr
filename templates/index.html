<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PDF/Image to Excel Converter</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f6f8fc;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .card {
            background: #fff;
            padding: 2rem;
            border-radius: 14px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            width: 100%;
            max-width: 500px;
        }
        h1 {
            margin-top: 0;
            color: #1a2a6c;
            font-size: 1.5rem;
        }
        p { color: #4f5d75; }
        input[type="file"] {
            width: 100%;
            margin: 1rem 0;
        }
        button {
            background: #1a73e8;
            color: #fff;
            border: none;
            padding: 0.7rem 1.2rem;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
        }
        .flash {
            background: #fdecea;
            color: #b71c1c;
            padding: 0.7rem;
            border-radius: 8px;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>PDF / Image to Excel Converter</h1>
        <p>Upload a PDF or image. The app detects if OCR is needed, extracts table-style data, and exports it to Excel.</p>

        {% with messages = get_flashed_messages() %}
            {% if messages %}
                {% for message in messages %}
                    <div class="flash">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="post" enctype="multipart/form-data">
            <input type="file" name="file" accept=".pdf,.png,.jpg,.jpeg,.tif,.tiff,.bmp" required>
            <button type="submit">Convert to Excel</button>
        </form>
    </div>
</body>
</html>
